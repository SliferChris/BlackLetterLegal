<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Black Letter Legal</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f6f1e7;
            color: #1f2937;
        }

        /* Wrapper to center everything */
        .contact-wrapper {
            max-width: 600px;
            margin: 80px auto;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        .contact-wrapper h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 6px;
            font-weight: bold;
        }

        input,
        textarea {
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        textarea {
            height: 150px;
            resize: vertical;
        }

        button {
            background-color: #c9a227;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background-color: #a8841f;
        }

        /* Mobile adjustment */
        @media (max-width: 600px) {
            .contact-wrapper {
                margin: 40px 20px;
                padding: 25px;
            }
        }
    </style>
</head>

<body>

<div class="contact-wrapper">
    <h2>Book a Session</h2>

<form action="https://formsubmit.co/BLACKLETTERLEGAL@hotmail.com" method="POST">

    <input type="hidden" name="_captcha" value="false">

    <input type="hidden" name="_subject" value="New Booking Request - Black Letter Legal">

    <input type="hidden" name="_template" value="table">

    <input type="hidden" name="_next" value="https://blackletterlegal.co.uk/thank-you.html">

    <input type="text" name="_honey" style="display:none">

    <label for="name">Name</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>

    <label for="message">Message</label>
    <textarea id="message" name="message" required></textarea>

    <button type="submit">Submit</button>
</form>
</div>

</body>

</html>
